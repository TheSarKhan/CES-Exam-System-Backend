spring:
  application:
    name: exam-system

  # Local dev loads application-local.yml (SMTP secrets) by default.
  # Override in production with the SPRING_PROFILES_ACTIVE environment variable.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: jdbc:postgresql://localhost:5432/ces_db
    username: ces_user
    password: ces_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  # Image uploads for image-based questions.
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # SMTP — values come from environment variables (see application-local.yml for local dev).
  # When MAIL_HOST is empty the e-mail feature stays disabled and links are shared manually.
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        connectiontimeout: 8000
        timeout: 8000
        writetimeout: 8000

server:
  port: 8080

# Expose only a liveness/readiness health endpoint (no sensitive details) for
# Docker/load-balancer probes at /actuator/health.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

# Application-level settings used when composing candidate e-mails.
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
  upload-dir: ${APP_UPLOAD_DIR:/app/uploads}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:CES Assessment}

jwt:
  # HMAC-SHA256 signing secret. MUST be overridden in production via the
  # JWT_SECRET environment variable; the fallback is for local dev only.
  secret: ${JWT_SECRET:ces_exam_system_secret_key_which_must_be_very_long}
  expiration:
    ms: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
